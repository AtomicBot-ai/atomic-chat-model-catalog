name: Catalog cron

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Bypass ETag/last-modified cache and rescrape everything'
        type: boolean
        default: false
      orgs_subset:
        description: 'Comma-separated subset of orgs to refresh (empty = all)'
        type: string
        default: ''
  repository_dispatch:
    types: [model-published, force-resync]

permissions:
  contents: write

concurrency:
  group: catalog-cron
  cancel-in-progress: false

jobs:
  scrape-and-publish:
    name: Scrape Hugging Face + publish catalog
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.5.x'

      - name: Set up Python via uv
        run: uv python install 3.13

      - name: Install scraper deps
        working-directory: scripts
        run: uv sync --frozen

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install index-builder deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Compute scrape arguments
        id: args
        env:
          ORGS_SUBSET_DISPATCH: ${{ inputs.orgs_subset }}
          ORGS_SUBSET_REPO: ${{ github.event.client_payload.orgs_subset }}
          FORCE_REBUILD_DISPATCH: ${{ inputs.force_rebuild }}
          FORCE_REBUILD_REPO: ${{ github.event.client_payload.force_rebuild }}
        run: |
          set -euo pipefail
          ORGS="${ORGS_SUBSET_DISPATCH:-${ORGS_SUBSET_REPO:-}}"
          FORCE="${FORCE_REBUILD_DISPATCH:-${FORCE_REBUILD_REPO:-false}}"
          ARGS=""
          if [ -n "$ORGS" ]; then
            ARGS="$ARGS --orgs $ORGS"
          fi
          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "Computed scraper args: $ARGS"

      - name: Validate orgs.json against schema
        run: |
          npx --yes ajv-cli@5 validate \
            -s config/schema.orgs.json \
            -d config/orgs.json \
            --strict=false

      - name: Run scraper
        working-directory: scripts
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          LOG_LEVEL: INFO
        run: |
          uv run python scrape.py \
            --config ../config/orgs.json \
            --out ../out \
            ${{ steps.args.outputs.args }}

      - name: Validate catalog.json against schema
        run: |
          npx --yes ajv-cli@5 validate \
            -s config/schema.catalog.json \
            -d out/catalog.json \
            --strict=false

      - name: Build MiniSearch index
        working-directory: scripts
        run: node build_index.mjs --in ../out/catalog.json --out ../out/catalog.idx.json

      - name: Compress artefacts with gzip
        # gzip -9 -k -f keeps the original .json files alongside the new
        # .json.gz files. Both shapes are uploaded to the release; the
        # client prefers .gz (~4x smaller transfer) and falls back to
        # .json transparently if the gzipped asset is missing.
        run: |
          gzip -9 -k -f out/catalog.json
          gzip -9 -k -f out/catalog.idx.json
          ls -lh out/

      - name: Compute release tag
        id: tag
        run: |
          STAMP=$(date -u +'%Y%m%d%H%M')
          echo "stamp=$STAMP" >> "$GITHUB_OUTPUT"
          echo "tag=catalog-$STAMP" >> "$GITHUB_OUTPUT"

      - name: Show artefact sizes
        run: |
          ls -lh out/
          echo "---"
          jq '{updated_at, manifest_version, schema_version, models: (.models|length), stats}' out/catalog.json

      - name: Publish dated release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 'Model catalog ${{ steps.tag.outputs.stamp }}'
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            out/catalog.json
            out/catalog.json.gz
            out/catalog.idx.json
            out/catalog.idx.json.gz
            out/stats.json
          body: |
            Generated by `cron.yml` on `${{ github.run_id }}` (${{ steps.tag.outputs.stamp }} UTC).

            Trigger: `${{ github.event_name }}`
            Args: `${{ steps.args.outputs.args }}`

      - name: Move `latest` alias release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 'Latest catalog (alias)'
          draft: false
          prerelease: false
          make_latest: 'true'
          fail_on_unmatched_files: true
          files: |
            out/catalog.json
            out/catalog.json.gz
            out/catalog.idx.json
            out/catalog.idx.json.gz
            out/stats.json
          body: |
            Always pinned to the most recent successful catalog cron run.

            Last refresh: ${{ steps.tag.outputs.stamp }} UTC
            Source tag:   ${{ steps.tag.outputs.tag }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
